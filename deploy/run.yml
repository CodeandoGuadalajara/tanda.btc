# PC-Coord: script coordinador LN (lanzar después de deploy/coord.yml)
#
# Uso (ejemplo con 3 participantes remotos):
#
#   N_PARTICIPANTS=3 \
#   P0_URL=http://192.168.1.10:8080 \
#   P1_URL=http://192.168.1.11:8080 \
#   P2_URL=http://192.168.1.12:8080 \
#   P0_CLN_HOST=192.168.1.10 \
#   P1_CLN_HOST=192.168.1.11 \
#   P2_CLN_HOST=192.168.1.12 \
#   docker compose -f deploy/coord.yml -f deploy/run.yml up coordinator
#
# Variables requeridas:
#   N_PARTICIPANTS      — número de participantes
#   P{i}_URL            — URL de la API del participante i  (http://IP:8080)
#   P{i}_CLN_HOST       — hostname o IP del nodo CLN del participante i
#   P{i}_CLN_P2P_PORT   — puerto P2P del nodo CLN del participante i  (default 9735)
#
# Variables opcionales:
#   CONTRIBUTION_SATS   — aportación en sats  (default 10000)
#   INTERACTIVE=1       — pausa entre rondas esperando Enter
#   ROUND=k             — ejecutar solo la ronda k (0-indexed)

services:
  coordinator:
    build: ..
    stdin_open: true
    tty: true
    networks:
      - tanda-coord-net
    environment:
      BITCOIND_RPC_URL:    ${BITCOIND_RPC_URL:-http://user:password@bitcoind:18443}
      CLN_COORDINATOR_RPC: ${CLN_COORDINATOR_RPC:-/cln/coordinator/regtest/lightning-rpc}
      N_PARTICIPANTS:      ${N_PARTICIPANTS:-3}
      CONTRIBUTION_SATS:   ${CONTRIBUTION_SATS:-10000}
      INTERACTIVE:         ${INTERACTIVE:-0}
      ROUND:               ${ROUND:-}

      P0_URL:           ${P0_URL:-http://127.0.0.1:8080}
      P0_CLN_HOST:      ${P0_CLN_HOST:-127.0.0.1}
      P0_CLN_P2P_PORT:  ${P0_CLN_P2P_PORT:-9735}

      P1_URL:           ${P1_URL:-http://127.0.0.1:8081}
      P1_CLN_HOST:      ${P1_CLN_HOST:-127.0.0.1}
      P1_CLN_P2P_PORT:  ${P1_CLN_P2P_PORT:-9735}

      P2_URL:           ${P2_URL:-http://127.0.0.1:8082}
      P2_CLN_HOST:      ${P2_CLN_HOST:-127.0.0.1}
      P2_CLN_P2P_PORT:  ${P2_CLN_P2P_PORT:-9735}

      P3_URL:           ${P3_URL:-}
      P3_CLN_HOST:      ${P3_CLN_HOST:-}
      P3_CLN_P2P_PORT:  ${P3_CLN_P2P_PORT:-9735}

      P4_URL:           ${P4_URL:-}
      P4_CLN_HOST:      ${P4_CLN_HOST:-}
      P4_CLN_P2P_PORT:  ${P4_CLN_P2P_PORT:-9735}

    volumes:
      - cln-coordinator-data-coord:/cln/coordinator
    command: python scripts/run_coordinator_ln.py

# Importa la red y los volúmenes definidos en deploy/coord.yml
networks:
  tanda-coord-net:
    external: true
    name: tanda-btc_tanda-coord-net

volumes:
  cln-coordinator-data-coord:
    external: true
    name: tanda-btc_cln-coordinator-data-coord
